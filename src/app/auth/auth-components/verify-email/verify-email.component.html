<section class="bg-light py-5">
  <div class="container px-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm p-4">
          <h2 class="h4 mb-2 text-center">Verify Email</h2>
          <p class="text-muted text-center mb-4">
            Confirm your email address to activate your account.
          </p>

          <div *ngIf="loading" class="text-center py-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="small text-muted mt-2 mb-0">Checking verification link...</p>
          </div>

          <div *ngIf="!loading">
            <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
            <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

            <form *ngIf="!successMessage" [formGroup]="form" (ngSubmit)="verify()">
              <ng-container *ngIf="requiresPasswordSetup">
                <div class="mb-3">
                  <label class="form-label">Password *</label>
                  <input type="password" class="form-control" formControlName="password" placeholder="Create password" />
                  <div class="text-danger small mt-1" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['required']">
                    Password is required.
                  </div>
                  <div class="text-danger small mt-1" *ngIf="form.get('password')?.touched && form.get('password')?.errors?.['minlength']">
                    Password must be at least 8 characters.
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password *</label>
                  <input type="password" class="form-control" formControlName="confirmPassword" placeholder="Confirm password" />
                  <div class="text-danger small mt-1" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.errors?.['required']">
                    Confirm password is required.
                  </div>
                  <div class="text-danger small mt-1" *ngIf="form.errors?.['passwordMismatch'] && form.get('confirmPassword')?.touched">
                    Passwords do not match.
                  </div>
                </div>
              </ng-container>

              <button class="btn btn-primary w-100" type="submit" [disabled]="submitting">
                <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
                {{ submitting ? 'Verifying...' : (requiresPasswordSetup ? 'Set Password and Verify' : 'Verify Email') }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
