<div class="card border-0 shadow-sm">
  <div class="card-body p-4 messages-page">
    <h4 class="fw-semibold mb-3">Messaging</h4>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-2 h-100">
          <div class="card-body">
            <h6 class="fw-semibold mb-3">Conversations</h6>

            <div *ngIf="conversations.length === 0" class="text-muted small mb-3">
              No conversations yet.
            </div>

            <button
              *ngFor="let c of conversations; trackBy: trackByConversationId"
              class="btn btn-light w-100 text-start mb-2"
              [class.active-conversation]="selectedConversationId === c.conversationId"
              (click)="openConversation(c.conversationId)"
            >
              <div class="d-flex justify-content-between align-items-start">
                <div>
                  <div class="fw-medium">{{ c.partner.firstName }} {{ c.partner.lastName }}</div>
                  <small class="text-muted">{{ c.lastMessagePreview || 'No messages yet' }}</small>
                </div>
                <span *ngIf="c.unreadCount > 0" class="badge bg-danger rounded-pill">{{ c.unreadCount }}</span>
              </div>
            </button>

            <hr />

            <h6 class="fw-semibold mb-2">Start new chat</h6>
            <div class="d-flex flex-column gap-2">
              <button
                *ngFor="let contact of contacts"
                class="btn btn-outline-primary text-start"
                (click)="startConversation(contact.id)"
              >
                {{ contact.firstName }} {{ contact.lastName }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card border-0 shadow-sm h-100">
          <div class="card-body d-flex flex-column">
            <h6 class="fw-semibold mb-3">{{ selectedPartnerName || 'Select a conversation' }}</h6>

            <div *ngIf="loading" class="text-muted">Loading messages...</div>

            <div *ngIf="!loading" class="messages-thread flex-grow-1 mb-3">
              <div *ngIf="messages.length === 0" class="text-muted small">No messages yet.</div>

              <div
                *ngFor="let msg of messages"
                class="d-flex mb-2"
                [class.justify-content-end]="msg.isOwn"
              >
                <div [class.own-message]="msg.isOwn" class="message-bubble">
                  <div>{{ msg.content }}</div>
                  <small class="text-muted">{{ msg.createdAt | date: 'short' }}</small>
                </div>
              </div>
            </div>

            <div class="input-group">
              <input
                type="text"
                class="form-control"
                [(ngModel)]="draftMessage"
                [disabled]="!selectedConversationId || sending"
                placeholder="Type your message..."
                (keyup.enter)="send()"
              />
              <button
                class="btn btn-primary"
                type="button"
                [disabled]="!selectedConversationId || sending || !draftMessage.trim()"
                (click)="send()"
              >
                {{ sending ? 'Sending...' : 'Send' }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
