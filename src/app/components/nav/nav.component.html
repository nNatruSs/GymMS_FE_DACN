<!-- Navigation-->
<nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
  <div class="container px-5">
    <!-- Brand on the left -->
    <!-- <a class="navbar-brand" href="/home"><span class="fw-bolder text-primary">Start Bootstrap</span></a> -->
<!-- Brand on the left -->
<a class="navbar-brand" routerLink="/home">
  <img src="assets/gym_ms_logo.png" alt="Logo" class="img-fluid" style="height: 50px;">
  GymMS
</a>

    <!-- Navbar toggle button for mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu items in the center -->
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
        <li class="nav-item"><a class="nav-link" routerLink="/home">Home</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/solutions">Solutions</a></li>
        <li class="nav-item"><a class="nav-link" routerLink="/our-services">Our Services</a></li>


        <!-- Show Dashboard Button if logged in based on user -->
        <li *ngIf="isUserLoggedIn" class="nav-item">
          <a class="nav-link" routerLink="/user/dashboard">
            <i class="fas fa-grip-horizontal"></i> Dashboard
          </a>
        </li>
        <li *ngIf="isAdminLoggedIn" class="nav-item">
          <a class="nav-link" routerLink="/admin/dashboard">
            <i class="fas fa-grip-horizontal"></i> Dashboard
          </a>
        </li>
        <li *ngIf="isTrainerLoggedIn" class="nav-item">
          <a class="nav-link" routerLink="/trainer/dashboard">
            <i class="fas fa-grip-horizontal"></i> Dashboard
          </a>
        </li>

        <li *ngIf="isAnyRoleLoggedIn()" class="nav-item position-relative">
          <button type="button" class="btn btn-link nav-link align-items-center" (click)="toggleNotifications()">
            <i class="fas fa-bell me-1"></i>
            <span *ngIf="unreadCount > 0" class="badge bg-danger rounded-pill ms-2">{{ unreadCount }}</span>
          </button>

          <div class="notification-dropdown shadow-sm" *ngIf="showNotifications">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <strong>Notifications</strong>
              <button type="button" class="btn btn-sm btn-outline-primary" (click)="markAllNotificationsRead()">
                Mark all read
              </button>
            </div>

            <div *ngIf="loadingNotifications" class="small text-muted">Loading...</div>
            <div *ngIf="!loadingNotifications && notifications.length === 0" class="small text-muted">
              No notifications.
            </div>

            <button
              type="button"
              *ngFor="let n of notifications"
              class="notification-item py-2 border-bottom text-start w-100 btn btn-link text-decoration-none"
              (click)="markNotificationRead(n)"
            >
              <div class="small">{{ notificationText(n) }}</div>
              <div class="text-muted tiny" *ngIf="n.createdAt">{{ n.createdAt | date:'short' }}</div>
            </button>
          </div>
        </li>

        <!-- Show Sign In Button if not logged in -->
        <li *ngIf="!isUserLoggedIn && !isAdminLoggedIn && !isTrainerLoggedIn" class="nav-item">
          <a class="nav-link" routerLink="/login">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </a>
        </li>
         <!-- Show User Profile if logged in -->
         <li *ngIf="isUserLoggedIn || isAdminLoggedIn || isTrainerLoggedIn" class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fas fa-user"></i> {{ userName }}
          </a>
          <ul class="dropdown-menu" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" routerLink="/profile">Profile</a></li>
            <li><a class="dropdown-item" (click)="onSignOutClick()">Sign Out</a></li>
          </ul>
        </li>

        
      </ul>
    </div>
  </div>
</nav>
